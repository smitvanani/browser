<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #faf8f5;
      --bg2: #f5f2ee;
      --text: #1a1a2e;
      --text-sub: #8b8b9e;
      --text-dim: #c5c5d5;
      --input-bg: rgba(255,255,255,0.7);
      --input-border: rgba(0,0,0,0.08);
      --link-bg: rgba(255,255,255,0.6);
      --link-hover: rgba(255,255,255,0.9);
      --card-shadow: 0 2px 20px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --bg: #0f0f1a;
      --bg2: #16162a;
      --text: #e8e8f0;
      --text-sub: #7878a0;
      --text-dim: #3a3a5c;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.08);
      --link-bg: rgba(255,255,255,0.04);
      --link-hover: rgba(255,255,255,0.08);
      --card-shadow: 0 2px 20px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.04);
      --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.08);
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes gradientShift { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes loadSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
    @keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(60px,-40px) scale(1.1)} 50%{transform:translate(-30px,-60px) scale(0.95)} 75%{transform:translate(-50px,20px) scale(1.05)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0) scale(1)} 25%{transform:translate(-70px,50px) scale(1.15)} 50%{transform:translate(40px,30px) scale(0.9)} 75%{transform:translate(60px,-40px) scale(1.1)} }
    @keyframes orb3 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,50px) scale(1.08)} 66%{transform:translate(-40px,-20px) scale(0.92)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    html,body { height:100%; font-family:'Inter',sans-serif; overflow:hidden; }
    body {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:var(--bg); color:var(--text);
    }

    /* Ambient orbs */
    .orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
    .orb:nth-child(1){width:500px;height:500px;top:-15%;right:10%;background:radial-gradient(circle,rgba(102,126,234,0.18),transparent 70%);animation:orb1 25s ease-in-out infinite}
    .orb:nth-child(2){width:400px;height:400px;bottom:0;left:-8%;background:radial-gradient(circle,rgba(236,72,153,0.14),transparent 70%);animation:orb2 30s ease-in-out infinite}
    .orb:nth-child(3){width:350px;height:350px;top:30%;right:-10%;background:radial-gradient(circle,rgba(139,92,246,0.12),transparent 70%);animation:orb3 20s ease-in-out infinite}
    .orb:nth-child(4){width:300px;height:300px;bottom:-10%;right:30%;background:radial-gradient(circle,rgba(34,211,238,0.1),transparent 70%);animation:orb1 22s ease-in-out infinite reverse}
    [data-theme="dark"] .orb:nth-child(1){background:radial-gradient(circle,rgba(102,126,234,0.12),transparent 70%)}
    [data-theme="dark"] .orb:nth-child(2){background:radial-gradient(circle,rgba(236,72,153,0.08),transparent 70%)}
    [data-theme="dark"] .orb:nth-child(3){background:radial-gradient(circle,rgba(139,92,246,0.08),transparent 70%)}
    [data-theme="dark"] .orb:nth-child(4){background:radial-gradient(circle,rgba(34,211,238,0.06),transparent 70%)}

    /* Noise texture overlay */
    .noise{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.03}

    /* Loading */
    .loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;z-index:101;overflow:hidden;opacity:0;transition:opacity 0.2s}
    .loading-bar.active{opacity:1}
    .loading-bar-inner{height:100%;width:30%;background:linear-gradient(90deg,transparent,var(--accent,#667eea),transparent);animation:loadSlide 1.2s ease-in-out infinite}
    .loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .loading-screen.active{opacity:1;pointer-events:auto}
    .loading-spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--input-border);border-top-color:var(--accent,#667eea);animation:spin 0.7s linear infinite}
    .loading-text{font-size:13px;color:var(--text-sub);font-weight:500}
    .loading-url{font-size:11px;color:var(--text-dim);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Main content */
    .content {
      position:relative; z-index:1; display:flex; flex-direction:column;
      align-items:center; text-align:center; width:100%; max-width:640px; padding:0 24px;
    }

    /* Greeting */
    .greeting {
      font-size:13px; font-weight:600; color:var(--text-sub);
      letter-spacing:2px; text-transform:uppercase;
      animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    /* Clock */
    .clock {
      font-size:clamp(72px,12vw,120px); font-weight:800; letter-spacing:-4px; line-height:1.05;
      font-family:'Space Grotesk',sans-serif;
      background:linear-gradient(135deg,var(--accent,#667eea) 0%,var(--accent2,#764ba2) 50%,var(--accent,#667eea) 100%);
      background-size:300% 300%; animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both, gradientShift 6s ease infinite;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-top:4px;
    }

    /* Date */
    .date {
      font-size:14px; font-weight:400; color:var(--text-sub);
      margin-top:4px; animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }

    /* Search */
    .search-wrap {
      margin-top:36px; width:100%; position:relative;
      animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    }
    .search-container {
      position:relative; display:flex; align-items:center;
      background:var(--input-bg); border:1px solid var(--input-border);
      border-radius:16px; overflow:hidden;
      box-shadow:var(--card-shadow);
      transition:all 0.35s cubic-bezier(0.22,1,0.36,1);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .search-container:focus-within {
      border-color:var(--accent,#667eea);
      box-shadow:0 0 0 4px rgba(102,126,234,0.1), var(--card-shadow-hover);
      transform:scale(1.01);
    }
    .search-icon {
      position:absolute; left:18px; color:var(--text-dim); font-size:15px;
      pointer-events:none; transition:color 0.3s;
    }
    .search-container:focus-within .search-icon { color:var(--accent,#667eea); }
    .search-bar {
      width:100%; padding:16px 20px 16px 46px; font-size:15px; font-family:'Inter',sans-serif;
      font-weight:400; background:transparent; border:none; color:var(--text); outline:none;
    }
    .search-bar::placeholder { color:var(--text-dim); font-weight:400; }
    .search-hint {
      position:absolute; right:16px; font-size:10px; color:var(--text-dim);
      background:var(--link-bg); padding:4px 10px; border-radius:8px;
      font-family:'SF Mono',ui-monospace,monospace; font-weight:500;
      pointer-events:none; opacity:0.7;
    }
    .search-suggestions {
      position:absolute; top:100%; left:0; right:0; margin-top:4px;
      background:var(--input-bg); border:1px solid var(--input-border);
      border-radius:14px; overflow:hidden; display:none;
      box-shadow:var(--card-shadow-hover);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      z-index:10; max-height:280px; overflow-y:auto;
    }
    .search-suggestions.visible { display:block; }
    .suggest-item {
      padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:10px;
      transition:background 0.15s;
    }
    .suggest-item:hover, .suggest-item.selected { background:var(--link-hover); }
    .suggest-icon { font-size:12px; color:var(--text-dim); flex-shrink:0; width:18px; text-align:center; }
    .suggest-text { flex:1; min-width:0; }
    .suggest-title { font-size:13px; color:var(--text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .suggest-url { font-size:10px; color:var(--text-sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
    .suggest-type { font-size:9px; color:var(--text-dim); background:var(--link-bg); padding:2px 6px; border-radius:5px; flex-shrink:0; }

    /* Quick Links */
    .links-section {
      margin-top:40px; width:100%;
      animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }
    .links-label {
      font-size:10px; font-weight:600; color:var(--text-dim);
      letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px;
    }
    .links {
      display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
    }
    .link {
      width:56px; height:56px; border-radius:16px;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      cursor:pointer; transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
      background:var(--link-bg); position:relative;
      box-shadow:var(--card-shadow);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .link:hover {
      transform:translateY(-6px) scale(1.05);
      background:var(--link-hover);
      box-shadow:var(--card-shadow-hover);
    }
    .link:active { transform:scale(0.92); transition-duration:0.1s; }
    .link img {
      width:24px; height:24px; border-radius:6px;
    }
    .link-fallback {
      display:none; font-size:20px; font-weight:700; line-height:1;
    }
    .link-name {
      position:absolute; bottom:-20px; left:50%; transform:translateX(-50%);
      font-size:10px; color:var(--text-sub); font-weight:500;
      white-space:nowrap; opacity:0; transition:opacity 0.25s;
      pointer-events:none;
    }
    .link:hover .link-name { opacity:1; }

    /* Bottom hint */
    .bottom-hint {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      font-size:11px; color:var(--text-dim); font-weight:400;
      animation:fadeIn 1s ease 1s both;
      display:flex; align-items:center; gap:6px;
    }
    .bottom-hint kbd {
      background:var(--link-bg); padding:2px 8px; border-radius:6px;
      font-family:'SF Mono',ui-monospace,monospace; font-size:10px;
      font-weight:500; border:1px solid var(--input-border);
    }
  </style>
</head>
<body>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="loading-bar" id="load-bar"><div class="loading-bar-inner"></div></div>
  <div class="loading-screen" id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Loading...</div>
    <div class="loading-url" id="loading-url"></div>
  </div>

  <div class="content">
    <div class="greeting" id="greeting">hello</div>
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date">loading...</div>

    <div class="search-wrap">
      <div class="search-container">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-bar" id="search" type="text" placeholder="Search the web or enter URL..." autocomplete="off" spellcheck="false" autofocus>
        <span class="search-hint">Enter</span>
      </div>
      <div class="search-suggestions" id="suggestions"></div>
    </div>

    <div class="links-section">
      <div class="links" id="links"></div>
    </div>
  </div>

  <div class="bottom-hint">
    <kbd>&#x2318;L</kbd> URL bar &nbsp; <kbd>&#x2318;T</kbd> New tab &nbsp; <kbd>&#x2318;W</kbd> Close tab
  </div>

  <script>
    // ═══ CLOCK ═══
    function updateClock() {
      const now = new Date()
      const h = now.getHours().toString().padStart(2,'0')
      const m = now.getMinutes().toString().padStart(2,'0')
      document.getElementById('clock').textContent = `${h}:${m}`

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December']
      document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`
    }
    updateClock()
    setInterval(updateClock, 10000)

    // ═══ GREETING ═══
    function updateGreeting(name) {
      const h = new Date().getHours()
      let greet = 'hello'
      if (h < 6) greet = 'late night'
      else if (h < 12) greet = 'good morning'
      else if (h < 17) greet = 'good afternoon'
      else if (h < 21) greet = 'good evening'
      else greet = 'good night'
      document.getElementById('greeting').textContent = name ? `${greet}, ${name}` : greet
    }
    updateGreeting()

    // ═══ SEARCH ═══
    const searchBar = document.getElementById('search')
    const loadingScreen = document.getElementById('loading-screen')
    const loadBar = document.getElementById('load-bar')
    const loadingText = document.getElementById('loading-text')
    const loadingUrl = document.getElementById('loading-url')

    setTimeout(() => searchBar.focus(), 300)

    // ═══ AUTOCOMPLETE ═══
    const suggestionsEl = document.getElementById('suggestions')
    let suggestTimeout = null
    let selectedIdx = -1
    let currentSuggestions = []

    function renderSuggestions(items) {
      currentSuggestions = items
      selectedIdx = -1
      if (items.length === 0) {
        suggestionsEl.classList.remove('visible')
        return
      }
      suggestionsEl.innerHTML = items.map((item, i) => `
        <div class="suggest-item" data-idx="${i}">
          <span class="suggest-icon">${item.type === 'history' ? '\u{1F552}' : '\u{1F50D}'}</span>
          <div class="suggest-text">
            <div class="suggest-title">${item.title || item.url}</div>
            ${item.url ? `<div class="suggest-url">${item.url}</div>` : ''}
          </div>
          ${item.type === 'history' ? '<span class="suggest-type">History</span>' : ''}
        </div>
      `).join('')
      suggestionsEl.classList.add('visible')

      suggestionsEl.querySelectorAll('.suggest-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx)
          const item = currentSuggestions[idx]
          if (item && item.url) navigateTo(item.url, 'Opening...')
        })
      })
    }

    function updateSelection() {
      suggestionsEl.querySelectorAll('.suggest-item').forEach((el, i) => {
        el.classList.toggle('selected', i === selectedIdx)
      })
    }

    async function fetchSuggestions(query) {
      if (!query || query.length < 2) { renderSuggestions([]); return }
      const results = []

      // History suggestions
      if (window.browserAPI && window.browserAPI.historySuggest) {
        try {
          const hist = await window.browserAPI.historySuggest(query)
          if (hist) hist.slice(0, 5).forEach(h => results.push({ ...h, type: 'history' }))
        } catch {}
      }

      renderSuggestions(results)
    }

    searchBar.addEventListener('input', () => {
      if (suggestTimeout) clearTimeout(suggestTimeout)
      suggestTimeout = setTimeout(() => fetchSuggestions(searchBar.value.trim()), 150)
    })

    function showLoading(text, url) {
      loadingText.textContent = text
      loadingUrl.textContent = url
      loadingScreen.classList.add('active')
      loadBar.classList.add('active')
    }

    function navigateTo(url, label) {
      showLoading(label || 'Loading...', url.replace(/https?:\/\//, '').split('?')[0])
      setTimeout(() => { window.location.href = url }, 350)
    }

    searchBar.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown' && currentSuggestions.length > 0) {
        e.preventDefault()
        selectedIdx = Math.min(selectedIdx + 1, currentSuggestions.length - 1)
        updateSelection()
        return
      }
      if (e.key === 'ArrowUp' && currentSuggestions.length > 0) {
        e.preventDefault()
        selectedIdx = Math.max(selectedIdx - 1, -1)
        updateSelection()
        return
      }
      if (e.key === 'Escape') {
        renderSuggestions([])
        return
      }
      if (e.key === 'Enter') {
        if (selectedIdx >= 0 && currentSuggestions[selectedIdx]) {
          const item = currentSuggestions[selectedIdx]
          if (item.url) { navigateTo(item.url, 'Opening...'); return }
        }
        const q = searchBar.value.trim()
        if (!q) return
        searchBar.blur()
        renderSuggestions([])
        if (q.startsWith('http://') || q.startsWith('https://')) {
          navigateTo(q, 'Opening...')
        } else if (q.includes('.') && !q.includes(' ')) {
          navigateTo('https://' + q, 'Opening...')
        } else {
          const s = window.__browserSettings || {}
          const engines = {
            google:'https://www.google.com/search?q=',
            duckduckgo:'https://duckduckgo.com/?q=',
            bing:'https://www.bing.com/search?q=',
            brave:'https://search.brave.com/search?q='
          }
          const engineName = (s.searchEngine || 'google').charAt(0).toUpperCase() + (s.searchEngine || 'google').slice(1)
          navigateTo((engines[s.searchEngine] || engines.google) + encodeURIComponent(q), 'Searching on ' + engineName + '...')
        }
      }
    })

    // ═══ QUICK LINKS ═══
    function renderLinks(settings) {
      const container = document.getElementById('links')
      let links = (settings && settings.quickLinks) || []

      if (links.length === 0) {
        links = [
          { name:'YouTube', url:'https://youtube.com', icon:'\u25B6', color:'#ff4444' },
          { name:'GitHub', url:'https://github.com', icon:'\u2B21', color:'#8b5cf6' },
          { name:'Twitter', url:'https://x.com', icon:'\uD835\uDD4F', color:'#1da1f2' },
          { name:'Google', url:'https://google.com', icon:'G', color:'#4285f4' },
          { name:'Reddit', url:'https://reddit.com', icon:'\u2295', color:'#ff6633' },
          { name:'ChatGPT', url:'https://chat.openai.com', icon:'\u25C9', color:'#10a37f' },
        ]
      }

      container.innerHTML = ''
      links.slice(0, 8).forEach((link, i) => {
        const el = document.createElement('div')
        el.className = 'link'
        el.style.animationDelay = (0.05 * i) + 's'
        const domain = link.url.replace(/https?:\/\//, '').split('/')[0]
        el.innerHTML = `
          <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
               style="border-radius:8px">
          <span class="link-fallback" style="color:${link.color || '#667eea'}">${link.icon || link.name[0]}</span>
          <span class="link-name">${link.name}</span>
        `
        el.addEventListener('click', () => { navigateTo(link.url, 'Opening ' + link.name + '...') })
        container.appendChild(el)
      })
    }
    renderLinks()

    // ═══ SETTINGS ═══
    window.applySettings = function(s) {
      if (typeof s === 'string') s = JSON.parse(s)
      const theme = s.theme || 'system'
      const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme:dark)').matches)
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light')
      if (s.accentColor) document.documentElement.style.setProperty('--accent', s.accentColor)
      updateGreeting(s.userName || '')
      renderLinks(s)
    }

    if (window.__browserSettings) window.applySettings(window.__browserSettings)

    // ═══ SUBTLE PARALLAX ON ORBS ═══
    let mx = 0, my = 0
    document.addEventListener('mousemove', e => {
      mx = (e.clientX / window.innerWidth - 0.5) * 2
      my = (e.clientY / window.innerHeight - 0.5) * 2
    })
    function animateOrbs() {
      document.querySelectorAll('.orb').forEach((orb, i) => {
        const speed = (i + 1) * 8
        orb.style.marginLeft = (mx * speed) + 'px'
        orb.style.marginTop = (my * speed) + 'px'
      })
      requestAnimationFrame(animateOrbs)
    }
    requestAnimationFrame(animateOrbs)
  </script>
</body>
</html>

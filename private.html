<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Private Window - Nova</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;font-family:-apple-system,Inter,sans-serif;gap:16px}
    .icon{font-size:48px;opacity:0.5}
    .title{font-size:24px;font-weight:700;letter-spacing:-0.5px}
    .desc{font-size:13px;color:#7878a0;max-width:420px;text-align:center;line-height:1.7}
    input{width:500px;max-width:80%;padding:14px 22px;border-radius:50px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none;font-family:Inter,sans-serif;margin-top:12px;transition:all 0.3s}
    input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15)}
    input::placeholder{color:#454568}
  </style>
</head>
<body>
  <div class="icon">&#x1F576;</div>
  <div class="title">Private Window</div>
  <div class="desc">Pages you visit in this window won't appear in your history. Cookies and site data will be cleared when you close this window.</div>
  <input type="text" id="search" placeholder="Search or enter URL..." autofocus>
  <script>
    document.getElementById('search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const q = this.value.trim()
        if (!q) return
        if (q.startsWith('http')) location.href = q
        else if (q.includes('.') && !q.includes(' ')) location.href = 'https://' + q
        else location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q)
      }
    })
  </script>
</body>
</html>
